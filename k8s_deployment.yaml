# ═══════════════════════════════════════════════════════
# Pulse-Chennai Kubernetes Deployment
# ═══════════════════════════════════════════════════════
# GPU-scheduled deployment with HPA and service/ingress.
# Requires NVIDIA device plugin on the cluster.
# ═══════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulse-chennai
  namespace: transit
  labels:
    app: pulse-chennai
    component: inference-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pulse-chennai
  template:
    metadata:
      labels:
        app: pulse-chennai
        component: inference-engine
    spec:
      containers:
        - name: pulse-chennai
          image: pulse-chennai:latest
          ports:
            - containerPort: 8001
              protocol: TCP
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
              nvidia.com/gpu: "1"
            limits:
              memory: "8Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pulse-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: pulse-secrets
                  key: redis-url
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: pulse-config
                  key: kafka-bootstrap-servers
            - name: KAFKA_TOPIC_GPS
              value: "bus-gps-pings"
            - name: KAFKA_TOPIC_PASSENGER
              value: "passenger-pings"
            - name: KAFKA_CONSUMER_GROUP
              value: "pulse-chennai-consumer"
            - name: TOMTOM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pulse-secrets
                  key: tomtom-api-key
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: model-weights
              mountPath: /app/models
              readOnly: true
      volumes:
        - name: model-weights
          persistentVolumeClaim:
            claimName: pulse-model-pvc
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-tesla-t4

---
apiVersion: v1
kind: Service
metadata:
  name: pulse-chennai-service
  namespace: transit
spec:
  selector:
    app: pulse-chennai
  ports:
    - port: 80
      targetPort: 8001
      protocol: TCP
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pulse-chennai-ingress
  namespace: transit
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  rules:
    - host: api.pulse-chennai.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
               service:
                 name: pulse-chennai-service
                 port:
                   number: 80

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pulse-chennai-hpa
  namespace: transit
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pulse-chennai
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # GPU utilization (requires DCGM exporter + custom metrics adapter)
    - type: Pods
      pods:
        metric:
          name: gpu_utilization
        target:
          type: AverageValue
          averageValue: "70"
